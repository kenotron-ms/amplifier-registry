name: Registry Sweep

on:
  schedule:
    # Run every 2 hours — keeps stars/forks current and embeddings fresh
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log changes but do not commit'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 1: Enrich bundles.json from GitHub API ─────────────────────────
      - name: Sweep GitHub repos and enrich bundles.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .github/scripts/sweep.mjs \
            --input bundles.json \
            --output bundles.json \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      # ── Step 2: Pre-compute semantic embeddings ──────────────────────────────
      # Cache the model weights so we don't re-download 6 MB every 2 hours.
      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: .hf-cache
          key: hf-all-minilm-l6-v2-q8-v1

      - name: Install embedding dependencies
        working-directory: .github/scripts
        run: npm install --no-package-lock

      - name: Generate bundle embeddings
        run: |
          node .github/scripts/generate-embeddings.mjs \
            --input bundles.json \
            --output embeddings.json \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      # ── Step 3: Commit both files ────────────────────────────────────────────
      - name: Commit updated data files
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "Amplifier Registry Bot"
          git config user.email "registry-bot@amplifier.dev"
          git diff --quiet bundles.json embeddings.json && echo "No changes." || (
            git add bundles.json embeddings.json &&
            git commit -m "chore(sweep): update registry data [$(date -u +%Y-%m-%dT%H:%M)]" &&
            git push
          )
